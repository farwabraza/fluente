<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUENTE · Italian, all the way to native</title>
<meta name="theme-color" content="#E0312E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FLUENTE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@300;400;500;600;700&family=Chivo+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --carta:#F2F0EA; --carta2:#E9E6DD; --ink:#17171C; --ink2:#3A3A42;
  --rosso:#E0312E; --rosso-dk:#B5201E; --blu:#1D3C8F; --giallo:#F2B705; --verde:#1E7A52;
  --line:#17171C; --radius:14px;
  --shadow: 0 2px 0 var(--ink);
  --font-d:'Archivo Black',sans-serif; --font-b:'Lexend',sans-serif; --font-m:'Chivo Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-b);background:var(--carta);color:var(--ink);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:1rem}
::selection{background:var(--giallo)}

/* ============ APP SHELL ============ */
#app{max-width:680px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--carta);border-left:2px solid var(--ink);border-right:2px solid var(--ink)}
@media(max-width:700px){#app{border:none}}
header{position:sticky;top:0;z-index:50;background:var(--carta);border-bottom:2px solid var(--ink)}
.hdr-strip{height:6px;background:linear-gradient(90deg,var(--rosso) 0 25%,var(--blu) 25% 50%,var(--giallo) 50% 75%,var(--verde) 75% 100%)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.logo{font-family:var(--font-d);font-size:1.3rem;letter-spacing:-.02em}
.logo span{color:var(--rosso)}
.hdr-stats{display:flex;gap:8px;align-items:center}
.pill{font-family:var(--font-m);font-size:.72rem;font-weight:700;border:2px solid var(--ink);border-radius:99px;padding:3px 10px;background:#fff;box-shadow:var(--shadow)}
.pill.lvl{background:var(--ink);color:var(--carta)}
.pill.fire{background:var(--giallo)}
main{flex:1;overflow-y:auto;padding:18px 16px 110px}

/* ============ NAV ============ */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:var(--ink);display:flex;z-index:60;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
nav button{flex:1;color:#9b9ba6;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;font-size:.62rem;font-family:var(--font-m);font-weight:700;letter-spacing:.04em;border-radius:10px;transition:all .15s}
nav button .ic{font-size:1.25rem;line-height:1}
nav button.on{color:var(--carta);background:#2a2a33}
nav button.on .dot{width:14px;height:3px;background:var(--rosso);border-radius:2px;margin-top:1px}
nav button .dot{width:14px;height:3px;background:transparent;border-radius:2px;margin-top:1px}

/* ============ GENERIC ============ */
.card{background:#fff;border:2px solid var(--ink);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card.flat{box-shadow:none}
.eyebrow{font-family:var(--font-m);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px}
.eyebrow.r{color:var(--rosso)} .eyebrow.b{color:var(--blu)} .eyebrow.g{color:var(--verde)}
h1{font-family:var(--font-d);font-size:1.7rem;line-height:1.1;letter-spacing:-.02em}
h2{font-family:var(--font-d);font-size:1.15rem;line-height:1.15;letter-spacing:-.01em;margin-bottom:8px}
h3{font-size:.95rem;font-weight:700;margin-bottom:4px}
.muted{color:var(--ink2);font-size:.86rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:.95rem;border:2px solid var(--ink);border-radius:12px;padding:12px 20px;background:#fff;box-shadow:var(--shadow);transition:transform .08s, box-shadow .08s}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn.primary{background:var(--rosso);color:#fff}
.btn.dark{background:var(--ink);color:var(--carta)}
.btn.yellow{background:var(--giallo)}
.btn.green{background:var(--verde);color:#fff}
.btn.sm{padding:8px 14px;font-size:.82rem;border-radius:10px}
.btn.block{display:flex;width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:10px;flex-wrap:wrap}
.tag{font-family:var(--font-m);font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:6px;border:1.5px solid var(--ink)}
.tag.a{background:var(--giallo)} .tag.bb{background:var(--blu);color:#fff} .tag.gg{background:var(--verde);color:#fff} .tag.rr{background:var(--rosso);color:#fff}
.progressbar{height:10px;border:2px solid var(--ink);border-radius:99px;background:#fff;overflow:hidden}
.progressbar>div{height:100%;background:var(--rosso);transition:width .4s cubic-bezier(.6,0,.2,1)}
.spinner{width:22px;height:22px;border:3px solid var(--carta2);border-top-color:var(--rosso);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.fadein{animation:fadein .35s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--ink);color:var(--carta);font-family:var(--font-m);font-size:.78rem;font-weight:700;padding:10px 18px;border-radius:99px;z-index:99;border:2px solid var(--giallo);animation:fadein .25s ease both}
.xpfly{position:fixed;z-index:99;font-family:var(--font-d);color:var(--verde);font-size:1.2rem;pointer-events:none;animation:xpfly 1s ease forwards}
@keyframes xpfly{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-50px)}}

/* ============ ONBOARDING ============ */
.onb-hero{padding:34px 6px 18px;text-align:left}
.onb-hero .big{font-family:var(--font-d);font-size:2.6rem;line-height:.98;letter-spacing:-.03em}
.onb-hero .big em{font-style:normal;color:var(--rosso)}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{border:2px solid var(--ink);border-radius:99px;padding:8px 14px;font-size:.85rem;font-weight:600;background:#fff;transition:all .1s}
.chip.on{background:var(--ink);color:var(--carta)}
.qopt{display:block;width:100%;text-align:left;border:2px solid var(--ink);border-radius:12px;padding:12px 14px;margin-bottom:8px;background:#fff;font-size:.95rem;font-weight:500;box-shadow:var(--shadow);transition:all .1s}
.qopt:active{transform:translateY(2px);box-shadow:none}
.qopt.sel{background:var(--ink);color:var(--carta)}
.qopt.right{background:var(--verde);color:#fff;border-color:var(--ink)}
.qopt.wrong{background:var(--rosso);color:#fff}
textarea.bigta{width:100%;min-height:130px;border:2px solid var(--ink);border-radius:12px;padding:12px;resize:vertical;background:#fff;font-size:.95rem}
textarea.bigta:focus,input.ti:focus{outline:3px solid var(--giallo)}
input.ti{width:100%;border:2px solid var(--ink);border-radius:12px;padding:12px;background:#fff}

/* ============ LA LINEA (metro map) ============ */
.linea-wrap{position:relative;padding:8px 0 8px 0}
.lv-block{position:relative;margin-bottom:4px}
.lv-head{display:flex;align-items:center;gap:10px;margin:14px 0 10px}
.lv-badge{font-family:var(--font-d);font-size:1rem;background:var(--ink);color:var(--carta);padding:6px 12px;border-radius:8px;min-width:52px;text-align:center}
.lv-badge.cur{background:var(--rosso)}
.lv-name{font-family:var(--font-m);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.stations{position:relative;margin-left:25px;border-left:6px solid var(--ink);padding:4px 0 14px 0}
.stations.locked{border-left-color:#c8c5ba}
.station{position:relative;display:flex;align-items:center;gap:14px;padding:10px 0 10px 22px;width:100%;text-align:left}
.station::before{content:'';position:absolute;left:-15px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:#fff;border:4px solid var(--ink)}
.station.done::before{background:var(--verde)}
.station.here::before{background:var(--rosso);box-shadow:0 0 0 5px rgba(224,49,46,.25);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(224,49,46,.25)}50%{box-shadow:0 0 0 9px rgba(224,49,46,.08)}}
.station.lock{opacity:.45}
.station.lock::before{border-color:#c8c5ba}
.st-txt b{display:block;font-size:.92rem}
.st-txt span{font-size:.74rem;color:var(--ink2)}
.st-go{margin-left:auto;font-family:var(--font-m);font-size:.66rem;font-weight:700;border:2px solid var(--ink);border-radius:8px;padding:4px 8px;background:var(--giallo);white-space:nowrap}
.station.done .st-go{background:var(--verde);color:#fff}

/* ============ LESSON MODAL ============ */
.modal{position:fixed;inset:0;background:rgba(23,23,28,.55);z-index:80;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--carta);width:100%;max-width:680px;max-height:94dvh;border-radius:22px 22px 0 0;border:2px solid var(--ink);border-bottom:none;display:flex;flex-direction:column;animation:slideup .3s cubic-bezier(.4,0,.2,1) both}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet-hd{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:2px solid var(--ink)}
.sheet-hd .x{margin-left:auto;font-family:var(--font-d);font-size:1.1rem;width:36px;height:36px;border:2px solid var(--ink);border-radius:10px;background:#fff;box-shadow:var(--shadow)}
.sheet-bd{padding:16px;overflow-y:auto;flex:1}
.concept{background:var(--blu);color:#fff;border:2px solid var(--ink);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.concept h2{color:#fff}
.concept .ex{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:.92rem}
.concept .ex b{color:var(--giallo)}
.mnemo{background:var(--giallo);border:2px solid var(--ink);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);margin-bottom:14px;font-size:.92rem}
.mnemo .eyebrow{color:var(--ink)}

/* ============ PARLA (dark booth) ============ */
.booth{background:var(--ink);color:var(--carta);border:2px solid var(--ink);border-radius:var(--radius);padding:16px;margin:-4px -4px 14px;min-height:60dvh;display:flex;flex-direction:column}
.booth .eyebrow{color:#8a8a96}
.chatlog{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 0;min-height:200px}
.bub{max-width:86%;padding:10px 14px;border-radius:14px;font-size:.93rem;line-height:1.45}
.bub.ai{background:#26262e;border:1.5px solid #3a3a44;align-self:flex-start;border-bottom-left-radius:4px}
.bub.me{background:var(--rosso);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bub .fix{display:block;margin-top:8px;padding-top:8px;border-top:1px dashed #555;font-size:.78rem;color:var(--giallo)}
.bub .tr{display:block;font-size:.76rem;color:#9a9aa6;margin-top:4px;font-style:italic}
.bub .spk{background:none;border:none;color:var(--giallo);font-size:.85rem;margin-left:6px;cursor:pointer}
.micbar{display:flex;gap:10px;align-items:center;margin-top:12px}
.micbtn{width:74px;height:74px;border-radius:50%;background:var(--rosso);border:3px solid var(--carta);color:#fff;font-size:1.7rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 0 0 0 rgba(224,49,46,.5)}
.micbtn.rec{animation:recpulse 1.2s infinite;background:#fff;color:var(--rosso)}
@keyframes recpulse{0%{box-shadow:0 0 0 0 rgba(224,49,46,.6)}70%{box-shadow:0 0 0 18px rgba(224,49,46,0)}100%{box-shadow:0 0 0 0 rgba(224,49,46,0)}}
.micbar input{flex:1;background:#26262e;border:2px solid #3a3a44;color:var(--carta);border-radius:12px;padding:12px}
.scen{display:flex;gap:10px;align-items:center;border:2px solid var(--ink);background:#fff;border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;width:100%;text-align:left;box-shadow:var(--shadow)}
.scen .em{font-size:1.6rem}
.scen b{display:block;font-size:.93rem}
.scen span{font-size:.76rem;color:var(--ink2)}
.scen.med{background:#EAF4EF}

/* ============ MEDICINA ============ */
.med-hero{background:var(--verde);color:#fff;border:2px solid var(--ink);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;position:relative;overflow:hidden}
.med-hero h1{color:#fff;font-size:1.4rem}
.med-hero .cross{position:absolute;right:-10px;top:-14px;font-family:var(--font-d);font-size:6rem;opacity:.15}

/* ============ CINEMA ============ */
.film{display:flex;gap:12px;border:2px solid var(--ink);background:#fff;border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);margin-bottom:12px}
.poster{width:54px;height:78px;border-radius:8px;border:2px solid var(--ink);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-family:var(--font-d);color:#fff}
.film b{font-size:.95rem}
.film .meta{font-size:.74rem;color:var(--ink2);margin:2px 0 4px}
.film p{font-size:.82rem}
.ladder{border-left:4px solid var(--rosso);padding:4px 0 4px 14px;margin:10px 0;font-size:.88rem}

/* ============ SRS ============ */
.srscard{perspective:1000px;min-height:230px;margin-bottom:14px}
.srsinner{position:relative;width:100%;min-height:230px;transition:transform .45s;transform-style:preserve-3d}
.srsinner.flip{transform:rotateY(180deg)}
.srsface{position:absolute;inset:0;backface-visibility:hidden;border:2px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
.srsface.front{background:#fff}
.srsface.back{background:var(--ink);color:var(--carta);transform:rotateY(180deg)}
.srsface .word{font-family:var(--font-d);font-size:1.6rem;letter-spacing:-.02em}
.srsface.back .word{color:var(--giallo)}
.gradebtns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gradebtns .btn{padding:10px 4px;font-size:.78rem}

/* misc */
.statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat{border:2px solid var(--ink);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow);padding:12px;text-align:center}
.stat .n{font-family:var(--font-d);font-size:1.5rem}
.stat .l{font-family:var(--font-m);font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
.mission{display:flex;align-items:center;gap:12px;border:2px solid var(--ink);background:#fff;border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);margin-bottom:10px;width:100%;text-align:left}
.mission .chk{width:26px;height:26px;border:2.5px solid var(--ink);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;background:#fff}
.mission.done{opacity:.6}
.mission.done .chk{background:var(--verde);color:#fff}
.feedback-box{background:#fff;border:2px solid var(--ink);border-left:8px solid var(--verde);border-radius:var(--radius);padding:14px;margin-top:12px;font-size:.9rem;white-space:pre-wrap}
button:focus-visible,.chip:focus-visible,.qopt:focus-visible{outline:3px solid var(--giallo);outline-offset:2px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hdr-strip"></div>
    <div class="hdr-row">
      <div class="logo">FLU<span>E</span>NTE</div>
      <div class="hdr-stats" id="hdrStats"></div>
    </div>
  </header>
  <main id="main"></main>
  <nav id="nav" style="display:none">
    <button data-tab="oggi"><span class="ic">☀</span>OGGI<span class="dot"></span></button>
    <button data-tab="linea"><span class="ic">Ⓜ</span>LINEA<span class="dot"></span></button>
    <button data-tab="parla"><span class="ic">🎙</span>PARLA<span class="dot"></span></button>
    <button data-tab="med"><span class="ic">✚</span>MEDICINA<span class="dot"></span></button>
    <button data-tab="cinema"><span class="ic">🎞</span>CINEMA<span class="dot"></span></button>
    <button data-tab="srs"><span class="ic">⚡</span>RIPASSO<span class="dot"></span></button>
  </nav>
</div>
<div id="overlay"></div>

<script>
/* =========================================================
   FLUENTE — Italian to native level. ADHD-first architecture:
   one screen = one job, sessions ≤ 5 min, instant feedback,
   speaking on day one, everything spaced-repeated.
========================================================= */

/* ---------- STATE & STORAGE (localStorage — this is a standalone PWA) ---------- */
const DEFAULT_STATE = {
  placed:false, level:'A1', levelIdx:0, xp:0, streak:0, lastDay:null,
  interests:[], name:'', unitsDone:{}, missions:{}, missionDay:null,
  deck:null, parlaTurns:0, writeDone:{}, xpLog:{}
};
let S = JSON.parse(JSON.stringify(DEFAULT_STATE));
let storageOK = true;
let CREDS = null; try{ CREDS = JSON.parse(localStorage.getItem('fluente-creds')||'null'); }catch(e){}
let syncTimer = null, syncStatus = 'local';

async function loadState(){
  try{
    const v = localStorage.getItem('fluente-state');
    if(v){ S = Object.assign({}, DEFAULT_STATE, JSON.parse(v)); }
  }catch(e){ /* first run */ }
  if(CREDS){
    try{
      const r = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(CREDS)});
      const d = await r.json();
      if(d.ok){
        syncStatus='cloud';
        if(d.state && (+d.updatedAt||0) >= (S._ts||0)){ S = Object.assign({}, DEFAULT_STATE, d.state); }
        else if(S.placed){ pushState(); } // this device is newer — upload it
      } else if(r.status===401){ CREDS=null; localStorage.removeItem('fluente-creds'); syncStatus='local'; }
    }catch(e){ syncStatus='offline'; }
  }
  if(!S.deck) S.deck = buildStarterDeck();
  if(!S.xpLog) S.xpLog = {};
}
async function save(){
  S._ts = Date.now();
  try{ localStorage.setItem('fluente-state', JSON.stringify(S)); }
  catch(e){ storageOK=false; }
  if(CREDS){ clearTimeout(syncTimer); syncTimer=setTimeout(pushState, 1500); }
}
async function pushState(){
  if(!CREDS) return;
  try{
    const r = await fetch('/api/state',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({}, CREDS, {state:S, updatedAt:S._ts}))});
    syncStatus = r.ok ? 'cloud' : 'offline';
  }catch(e){ syncStatus='offline'; }
}
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }

/* ---------- AI (proxied through our own server — API key lives in Replit Secrets) ---------- */
async function ai(messages, system, expectJSON=false){
  try{
    const res = await fetch("/api/chat",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({messages, system})
    });
    const data = await res.json();
    if(data.error){ console.error(data.error); return expectJSON?null:"⚠ "+(data.error.message||'API error — check your key in Replit Secrets.'); }
    let text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    if(expectJSON){
      text = text.replace(/```json|```/g,'').trim();
      const a = text.indexOf('{'), b = text.lastIndexOf('}');
      const aa = text.indexOf('['), bb = text.lastIndexOf(']');
      if(aa>-1 && (aa<a || a===-1)) return JSON.parse(text.slice(aa,bb+1));
      return JSON.parse(text.slice(a,b+1));
    }
    return text;
  }catch(e){ console.error('AI error',e); return expectJSON ? null : "⚠ Connection hiccup — tap to retry."; }
}

/* ---------- SPEECH ---------- */
let voices=[], itVoice=null;
function loadVoices(){
  voices = speechSynthesis.getVoices();
  itVoice = voices.find(v=>v.lang==='it-IT' && /female|alice|elsa|federica/i.test(v.name)) || voices.find(v=>v.lang&&v.lang.startsWith('it')) || null;
}
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text, rate=0.92){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\*/g,''));
  u.lang='it-IT'; if(itVoice) u.voice=itVoice; u.rate=rate;
  speechSynthesis.speak(u);
}
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function listen(onResult, onEnd, onErr){
  if(!SR){ onErr && onErr('nosr'); return null; }
  const r = new SR(); r.lang='it-IT'; r.interimResults=false; r.maxAlternatives=1;
  r.onresult = e => onResult(e.results[0][0].transcript);
  r.onend = ()=> onEnd && onEnd();
  r.onerror = e => onErr && onErr(e.error);
  try{ r.start(); }catch(e){ onErr && onErr('busy'); }
  return r;
}

/* ---------- HELPERS ---------- */

function runPlacement(){
  let i=0, score=[0,0,0,0,0]; // per band
  const seen=[0,0,0,0,0];
  function q(){
    if(i>=PLACEMENT.length){ return writingStep(); }
    const Q=PLACEMENT[i];
    seen[Q.lv]++;
    main.innerHTML = `
    <div class="fadein">
      <div class="eyebrow r">PLACEMENT · ${i+1} / ${PLACEMENT.length}</div>
      <div class="progressbar" style="margin-bottom:16px"><div style="width:${(i/PLACEMENT.length)*100}%"></div></div>
      <div class="card"><h2>${esc(Q.q)}</h2></div>
      ${Q.o.map((o,k)=>`<button class="qopt" data-k="${k}">${esc(o)}</button>`).join('')}
      <button class="btn sm block" id="skipQ" style="margin-top:8px;background:var(--carta2)">Boh, no idea — skip</button>
    </div>`;
    document.querySelectorAll('.qopt').forEach(b=>b.onclick=()=>{
      if(+b.dataset.k===Q.a) score[Q.lv]++;
      i++; q();
    });
    $('#skipQ').onclick=()=>{i++;q();};
  }
  function writingStep(){
    main.innerHTML = `
    <div class="fadein">
      <div class="eyebrow r">PLACEMENT · WRITING SAMPLE</div>
      <div class="card">
        <h2>Write 3–6 sentences in Italian</h2>
        <p class="muted">About anything — your day, your studies, why you're learning. Don't translate in your head, just write. If you truly can't yet, leave it blank.</p>
      </div>
      <textarea class="bigta" id="wSample" placeholder="Ciao! Mi chiamo…"></textarea>
      <button class="btn primary block" id="wGo" style="margin-top:12px">Grade me →</button>
    </div>`;
    $('#wGo').onclick=async()=>{
      $('#wGo').innerHTML='<span class="spinner"></span> Grading…'; $('#wGo').disabled=true;
      const sample = $('#wSample').value.trim();
      // MCQ-derived level
      let mcqIdx=0;
      const bands=[0,1,2,3,4];
      for(const b of bands){ if(seen[b]&&score[b]/seen[b]>=0.5) mcqIdx=b+1; else break; }
      let finalIdx=Math.min(mcqIdx,5), note='';
      if(sample.length>15){
        const res = await ai([{role:'user',content:`CEFR-grade this Italian writing sample from a learner. Sample: """${sample}"""\nRespond ONLY with JSON: {"cefr":"A1|A2|B1|B2|C1|C2","strengths":"one short sentence","fix":"the single most important thing to fix, one short sentence"}`}],'You are a strict but kind CEFR examiner for Italian. JSON only, no markdown.',true);
        if(res&&res.cefr){
          const wIdx=LEVELS.indexOf(res.cefr);
          if(wIdx>-1) finalIdx=Math.round((finalIdx+wIdx)/2);
          note=`<div class="feedback-box"><b>Examiner notes</b>\n✅ ${esc(res.strengths||'')}\n🔧 ${esc(res.fix||'')}</div>`;
        }
      }
      finalIdx=Math.max(0,Math.min(5,finalIdx));
      S.levelIdx=finalIdx; S.level=LEVELS[finalIdx]; S.placed=true; touchStreak(); save();
      main.innerHTML = `
      <div class="fadein" style="text-align:center;padding-top:30px">
        <div class="eyebrow r">DIAGNOSIS COMPLETE</div>
        <div style="font-family:var(--font-d);font-size:5rem;color:var(--rosso);line-height:1">${S.level}</div>
        <h2 style="margin:8px 0 4px">${LEVEL_NAMES[S.level]}</h2>
        <p class="muted">Your boarding station. Everything below it stays unlocked for review; everything above unlocks as you pass checkpoints.</p>
        ${note}
        <button class="btn primary block" id="enterApp" style="margin-top:18px">Board the line →</button>
      </div>`;
      $('#enterApp').onclick=()=>{ $('#nav').style.display='flex'; renderHeader(); setTab('oggi'); };
    };
  }
  q();
}

/* ----- Weekly XP strip ----- */
function weekStrip(){
  const days=[]; const labels=['L','M','M','G','V','S','D'];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i);
    days.push({k:d.toISOString().slice(0,10), wd:(d.getDay()+6)%7, today:i===0}); }
  const max=Math.max(40,...days.map(d=>S.xpLog[d.k]||0));
  return `<div style="display:flex;align-items:flex-end;gap:8px;height:74px">${days.map(d=>{
    const v=S.xpLog[d.k]||0, h=Math.round(v/max*52);
    return `<div style="flex:1;text-align:center"><div style="font-family:var(--font-m);font-size:.6rem;font-weight:700;color:var(--ink2)">${v||''}</div><div style="height:${Math.max(h,3)}px;background:${d.today?'var(--rosso)':v?'var(--blu)':'var(--carta2)'};border-radius:4px 4px 0 0;border:1.5px solid var(--ink);border-bottom:none"></div><div style="font-family:var(--font-m);font-size:.62rem;font-weight:700;${d.today?'color:var(--rosso)':''}">${labels[d.wd]}</div></div>`;
  }).join('')}</div>`;
}

function renderDettato(){
  let round=0, score=0;
  const bank=[...(DETTATO_BANK[S.level]||DETTATO_BANK.B1)].sort(()=>Math.random()-0.5);
  function play(){
    if(round>=3) return done();
    const target=bank[round%bank.length];
    main.innerHTML=`
    <div class="fadein">
      <button class="btn sm" id="dBack" style="margin-bottom:10px">← Oggi</button>
      <div class="eyebrow r">DETTATO · ${round+1} / 3 · ${S.level}</div>
      <h1 style="margin-bottom:10px">Type what you hear.</h1>
      <div class="card" style="text-align:center">
        <button class="btn primary" id="dPlay">🔊 Play</button>
        <button class="btn yellow" id="dSlow">🐢 Slow</button>
        <p class="muted" style="margin-top:8px">Listen as many times as you need. Accents matter, but I'll be kind.</p>
      </div>
      <textarea class="bigta" id="dTa" placeholder="Scrivi quello che senti…" autocapitalize="off"></textarea>
      <button class="btn dark block" id="dCheck" style="margin-top:10px">Check →</button>
      <div id="dFb"></div>
    </div>`;
    $('#dBack').onclick=()=>setTab('oggi');
    $('#dPlay').onclick=()=>speak(target,0.88);
    $('#dSlow').onclick=()=>speak(target,0.6);
    speak(target,0.88);
    $('#dCheck').onclick=()=>{
      const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z' ]/g,'').split(/\s+/).filter(Boolean);
      const T=norm(target), U=norm($('#dTa').value);
      const diff=target.split(/\s+/).map((w,i)=>{
        const cw=norm(w)[0]||''; const hit=U[i]===cw;
        return `<span style="background:${hit?'#cdeedd':'#ffd2d0'};padding:1px 4px;border-radius:4px">${esc(w)}</span>`;
      }).join(' ');
      const hits=T.filter((w,i)=>U[i]===w).length, pct=Math.round(hits/T.length*100);
      if(pct>=70) score++;
      $('#dFb').innerHTML=`<div class="feedback-box"><b>${pct}% — ${pct>=90?'orecchio d\'oro 🏆':pct>=70?'molto bene ✓':'riascolta e riprova domani'}</b><br><br>${diff}</div>
      <button class="btn green block" id="dNext" style="margin-top:10px">${round<2?'Next sentence →':'Finish →'}</button>`;
      $('#dCheck').style.display='none';
      $('#dNext').onclick=()=>{round++;play();};
    };
  }
  function done(){
    gainXP(15); touchStreak(); save();
    main.innerHTML=`<div class="fadein" style="text-align:center;padding-top:50px"><div style="font-size:3rem">👂</div><h1>${score}/3 sentences nailed</h1><p class="muted">+15 XP. Dictation is the fastest way to close the gap between "I know that word" and "I caught that word at native speed".</p><button class="btn primary" style="margin-top:14px" id="dDone">Back to Oggi →</button></div>`;
    $('#dDone').onclick=()=>setTab('oggi');
  }
  play();
}

function renderSprint(){
  const pool=SPRINT_BANK.filter(v=>v[4]<=S.levelIdx).sort(()=>Math.random()-0.5);
  if(pool.length<5) pool.push(...SPRINT_BANK.slice(0,8));
  let i=0, hits=0, t=60, timer=null;
  function ui(){
    const v=pool[i%pool.length];
    main.innerHTML=`
    <div class="fadein">
      <button class="btn sm" id="sBack" style="margin-bottom:10px">← Oggi</button>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="eyebrow r">VERB SPRINT</div>
        <span class="pill" id="sClock" style="background:var(--rosso);color:#fff">⏱ ${t}s</span>
      </div>
      <div class="card" style="text-align:center;margin-top:8px">
        <div class="eyebrow">${esc(v[2]).toUpperCase()}</div>
        <div style="font-family:var(--font-d);font-size:1.9rem">${esc(v[0])} · ${esc(v[1])}</div>
      </div>
      <input class="ti" id="sIn" placeholder="conjugate…" autocomplete="off" autocapitalize="off" style="text-align:center;font-size:1.2rem">
      <button class="btn dark block" id="sGo" style="margin-top:10px">Check (↵)</button>
      <div style="text-align:center;margin-top:10px"><span class="pill fire">⚡ ${hits} correct</span></div>
      <div id="sFb" style="text-align:center;margin-top:8px;font-weight:700"></div>
    </div>`;
    $('#sBack').onclick=()=>{clearInterval(timer);setTab('oggi');};
    const inp=$('#sIn'); inp.focus();
    function check(){
      const norm=s=>s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(norm(inp.value)===norm(v[3])){ hits++; $('#sFb').innerHTML='<span style="color:var(--verde)">✓ '+esc(v[3])+'</span>'; }
      else{ $('#sFb').innerHTML='<span style="color:var(--rosso)">✗ → '+esc(v[3])+'</span>'; }
      i++; setTimeout(()=>{ if(t>0) ui(); },550);
    }
    $('#sGo').onclick=check;
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')check();});
    if(!timer){ timer=setInterval(()=>{ t--; const c=$('#sClock'); if(c)c.textContent='⏱ '+t+'s';
      if(t<=0){ clearInterval(timer); end(); } },1000); }
  }
  function end(){
    const xp=Math.min(hits*3,30); if(xp)gainXP(xp); touchStreak(); save();
    main.innerHTML=`<div class="fadein" style="text-align:center;padding-top:50px"><div style="font-size:3rem">⏱</div><h1>${hits} in 60 seconds</h1><p class="muted">+${xp} XP. Conjugation under time pressure is what makes verbs come out of your mouth pre-built instead of assembled live.</p><button class="btn primary" style="margin-top:14px" id="sDone">Back to Oggi →</button></div>`;
    $('#sDone').onclick=()=>setTab('oggi');
  }

}

function renderLinea(){
  let html=`<div class="fadein"><div class="eyebrow r">LA LINEA F · ${S.level} → C2</div>
  <h1 style="margin-bottom:4px">Your route to native.</h1>
  <p class="muted" style="margin-bottom:10px">Every station = one 5-minute lesson, AI-built fresh each time. Checkpoints are mini oral exams — pass to unlock the next zone.</p>`;
  LEVELS.forEach((lv,li)=>{
    const units=CURRICULUM[lv];
    const locked = li>S.levelIdx;
    const doneAll = units.every(u=>S.unitsDone[u.id]);
    html+=`<div class="lv-block">
      <div class="lv-head"><span class="lv-badge ${li===S.levelIdx?'cur':''}">${lv}</span><span class="lv-name">${LEVEL_NAMES[lv]} ${doneAll?'· COMPLETE ✓':''} ${locked?'· LOCKED 🔒':''}</span></div>
      <div class="stations ${locked?'locked':''}">`;
    units.forEach((u,ui)=>{
      const done=S.unitsDone[u.id];
      const prevDone = ui===0 || S.unitsDone[units[ui-1].id];
      const here = li===S.levelIdx && !done && prevDone;
      const lock = locked || (!done && !prevDone);
      html+=`<button class="station ${done?'done':''} ${here?'here':''} ${lock?'lock':''}" data-id="${u.id}" data-lv="${lv}" ${lock?'disabled':''}>
        <span class="st-txt"><b>${esc(u.t)}</b><span>${esc(u.d)}</span></span>
        <span class="st-go">${done?'REVIEW':(u.exam?'EXAM':'GO →')}</span>
      </button>`;
    });
    html+=`</div></div>`;
  });
  html+='</div>';
  main.innerHTML=html;
  document.querySelectorAll('.station:not(.lock)').forEach(b=>b.onclick=()=>{
    const lv=b.dataset.lv, u=CURRICULUM[lv].find(x=>x.id===b.dataset.id);
    u.exam ? openCheckpoint(u,lv) : openLesson(u,lv);
  });
}

/* ----- Micro-lesson: concept → mnemonic → 5 drills → speak ----- */
async function openLesson(unit, lv){
  showSheet(`<div class="eyebrow r">${lv} · ${esc(unit.t)}</div>`,`<div style="text-align:center;padding:40px 0"><span class="spinner"></span><p class="muted" style="margin-top:10px">Building your lesson…</p></div>`);
  const lesson = await ai([{role:'user',content:`Create a 5-minute Italian micro-lesson. Level: ${lv}. Topic: "${unit.t}" (${unit.d}). Learner: a medical student with ADHD who loves mnemonics.
Respond ONLY with JSON:
{"concept":{"title":"...","bullets":["3-4 punchy bullets explaining the core rule/idea","..."],"examples":[{"it":"Italian example","en":"translation"},{"it":"...","en":"..."}]},
"mnemonic":"one vivid memory hook for the trickiest part of this topic",
"drills":[{"q":"question (can include ___ gaps)","options":["4 options"],"answer":0,"why":"8-word explanation"} x5 — calibrate difficulty to ${lv}],
"speak":{"prompt":"a single sentence the learner must say aloud in Italian, using today's grammar","model":"the model Italian sentence"},
"newcards":[{"it":"word/phrase from this lesson","en":"meaning","mn":"mnemonic","ex":"example sentence"} x2]}`}],'You are a brilliant Italian curriculum designer. JSON only, no markdown fences. Drills must genuinely test the concept.',true);
  if(!lesson){ sheetBody(`<div class="card">⚠ Couldn't build the lesson — check connection and tap the station again.</div>`); return; }
  let di=0, correct=0;
  function drillView(){
    if(di>=lesson.drills.length) return speakView();
    const D=lesson.drills[di];
    sheetBody(`
      <div class="eyebrow b">DRILL ${di+1} / ${lesson.drills.length}</div>
      <div class="card"><h2>${esc(D.q)}</h2></div>
      ${D.options.map((o,k)=>`<button class="qopt" data-k="${k}">${esc(o)}</button>`).join('')}
      <div id="drillFb"></div>`);
    document.querySelectorAll('.sheet .qopt').forEach(b=>b.onclick=()=>{
      const k=+b.dataset.k;
      document.querySelectorAll('.sheet .qopt').forEach(x=>x.disabled=true);
      if(k===D.answer){ b.classList.add('right'); correct++; }
      else{ b.classList.add('wrong'); document.querySelectorAll('.sheet .qopt')[D.answer].classList.add('right'); }
      $('#drillFb').innerHTML=`<div class="mnemo fadein" style="margin-top:10px"><b>${k===D.answer?'✓ Esatto!':'✗'} </b>${esc(D.why)}</div><button class="btn dark block" id="nextD">Next →</button>`;
      $('#nextD').onclick=()=>{di++;drillView();};
    });
  }
  function speakView(){
    sheetBody(`
      <div class="eyebrow r">FINAL STATION TASK · SPEAK IT</div>
      <div class="card"><h2>${esc(lesson.speak.prompt)}</h2>
        <p class="muted">Model answer (tap to hear):</p>
        <button class="btn sm yellow" id="hearModel">🔊 ${esc(lesson.speak.model)}</button>
      </div>
      <button class="btn primary block" id="speakNow">🎙 Say it out loud</button>
      <div id="speakFb" style="margin-top:10px"></div>
      <button class="btn sm block" id="skipSpeak" style="margin-top:8px;background:var(--carta2)">No mic here — I said it, I swear</button>`);
    $('#hearModel').onclick=()=>speak(lesson.speak.model);
    $('#speakNow').onclick=()=>{
      $('#speakNow').textContent='🔴 Listening… speak now';
      listen(async heard=>{
        $('#speakFb').innerHTML=`<div class="feedback-box">You said: <b>${esc(heard)}</b>\nTarget: ${esc(lesson.speak.model)}\n${similar(heard,lesson.speak.model)?'🎯 Nailed it!':'Close — listen to the model again and once more!'}</div>`;
        finish();
      },null,()=>{ $('#speakFb').innerHTML='<div class="feedback-box">Mic unavailable — say it aloud anyway, then finish below.</div>'; finish(); });
    };
    $('#skipSpeak').onclick=finish;
    function finish(){
      if($('#finishL'))return;
      const btn=document.createElement('button'); btn.id='finishL'; btn.className='btn green block'; btn.style.marginTop='10px';
      btn.textContent=`Finish station · +30 XP (${correct}/${lesson.drills.length} drills)`;
      $('#speakFb').after(btn);
      btn.onclick=()=>{
        S.unitsDone[unit.id]=true; S.missions.lesson=true; touchStreak(); gainXP(30);
        (lesson.newcards||[]).forEach((c,i)=>S.deck.push({id:unit.id+'-'+i, it:c.it,en:c.en,mn:c.mn,ex:c.ex,due:Date.now(),ivl:0,ease:2.5}));
        save(); closeSheet(); toast('Station complete! New words added to Ripasso ⚡'); renderLinea();
      };
    }
  }
  sheetBody(`
    <div class="concept fadein">
      <div class="eyebrow" style="color:var(--giallo)">IL CONCETTO</div>
      <h2>${esc(lesson.concept.title)}</h2>
      <ul style="padding-left:18px;margin-top:6px">${lesson.concept.bullets.map(b=>`<li style="margin-bottom:4px;font-size:.92rem">${esc(b)}</li>`).join('')}</ul>

function similar(a,b){
  const n=s=>s.toLowerCase().replace(/[^a-zàèéìòù ]/g,'').split(/\s+/).filter(Boolean);
  const A=n(a),B=new Set(n(b)); if(!A.length)return false;
  return A.filter(w=>B.has(w)).length/Math.max(B.size,1) >= 0.6;
}

/* ----- Checkpoint oral exam ----- */
async function openCheckpoint(unit,lv){
  showSheet(`<div class="eyebrow r">CHECKPOINT · ${lv} ORAL EXAM</div>`,`
    <div class="card"><h2>3 questions. Answer in Italian — speak or type.</h2>
    <p class="muted">An AI examiner grades structure, vocabulary, and whether you'd survive this level in the wild. Pass = next zone unlocks.</p></div>
    <button class="btn primary block" id="startEx">Begin esame →</button>`);
  $('#startEx').onclick=async()=>{
    sheetBody(`<div style="text-align:center;padding:40px 0"><span class="spinner"></span><p class="muted" style="margin-top:8px">The examiner is preparing…</p></div>`);
    const qs = await ai([{role:'user',content:`Generate 3 oral exam questions for CEFR ${lv} Italian (themes from this level: ${CURRICULUM[lv].map(u=>u.t).join(', ')}). Learner is a medical student — make 1 question medically themed if level is A2+. Respond ONLY with JSON: {"questions":["q1 in Italian","q2","q3"]}`}],'JSON only.',true);
    if(!qs||!qs.questions){ sheetBody('<div class="card">⚠ Connection issue — reopen the checkpoint.</div>'); return; }
    let qi=0; const answers=[];
    function ask(){
      if(qi>=3) return grade();
      const q=qs.questions[qi];
      sheetBody(`
        <div class="eyebrow b">DOMANDA ${qi+1} / 3</div>
        <div class="card"><h2>${esc(q)} <button class="spk" onclick="speak('${esc(q).replace(/'/g,"\\'")}')" style="background:none;border:none;cursor:pointer">🔊</button></h2></div>
        <button class="btn primary block" id="exSpeak">🎙 Answer aloud</button>
        <p class="muted" style="text-align:center;margin:8px 0">or type:</p>
        <textarea class="bigta" id="exTa" style="min-height:80px"></textarea>
        <button class="btn dark block" id="exNext" style="margin-top:8px">Submit answer →</button>`);
      $('#exSpeak').onclick=()=>{ $('#exSpeak').textContent='🔴 Listening…';
        listen(h=>{$('#exTa').value=h;$('#exSpeak').textContent='🎙 Re-record';},null,()=>{$('#exSpeak').textContent='Mic unavailable — type instead';});
      };
      $('#exNext').onclick=()=>{ answers.push({q,a:$('#exTa').value.trim()||'(no answer)'}); qi++; ask(); };
    }
    async function grade(){
      sheetBody(`<div style="text-align:center;padding:40px 0"><span class="spinner"></span><p class="muted" style="margin-top:8px">Grading…</p></div>`);
      const res = await ai([{role:'user',content:`CEFR ${lv} oral exam. Q&A pairs: ${JSON.stringify(answers)}. Respond ONLY with JSON: {"pass":true|false,"score":"X/10","feedback":"3 short bullet points: what was good, the #1 grammar issue, the #1 thing to drill next. Plain text with • bullets."}`}],'Fair but rigorous Italian oral examiner. Pass requires genuinely adequate level performance, but reward communication over perfection. JSON only.',true);
      if(!res){ sheetBody('<div class="card">⚠ Grading failed — reopen and retry.</div>'); return; }
      if(res.pass){
        S.unitsDone[unit.id]=true;
        if(S.levelIdx<5 && lv===S.level){ S.levelIdx++; S.level=LEVELS[S.levelIdx]; }
        gainXP(100); touchStreak(); save();
      }
      sheetBody(`
        <div style="text-align:center;padding:10px 0">
          <div style="font-family:var(--font-d);font-size:3.4rem;color:${res.pass?'var(--verde)':'var(--rosso)'}">${res.pass?'PROMOSSA':'RIPROVA'}</div>
          <div class="pill" style="display:inline-block;margin:6px 0">${esc(res.score||'')}</div>
        </div>
        <div class="feedback-box">${esc(res.feedback||'')}</div>
        <button class="btn ${res.pass?'green':'primary'} block" id="exDone" style="margin-top:12px">${res.pass?'Enter '+S.level+' →':'Back to drilling — you\'ll get it'}</button>`);
      $('#exDone').onclick=()=>{closeSheet();renderLinea();};
    }
    ask();
  };
}

    3:'IT audio + <b>Italian subs</b>, second viewing <b>no subs</b>.',
    4:'<b>No subs.</b> IT subs only for dialect-heavy scenes.',
    5:'No subs, ever. Now you\'re watching for fun, like a native — because you are one.'
  }[myIdx];
  main.innerHTML = `
  <div class="fadein">
    <div class="eyebrow r">CINEMA · PRESCRIBED INPUT</div>
    <h1 style="margin-bottom:6px">Watch your way to fluent.</h1>
    <div class="card" style="background:var(--ink);color:var(--carta)">
      <div class="eyebrow" style="color:var(--giallo)">YOUR SUBTITLE LADDER AT ${S.level}</div>
      <p style="font-size:.9rem">${ladderText}</p>
      <p style="font-size:.78rem;opacity:.7;margin-top:6px">Rule of thumb: subtitles are training wheels — keep them exactly one notch behind your comfort, never two.</p>
    </div>
    ${liked.length?`<div class="eyebrow b" style="margin-top:6px">PRESCRIBED FOR YOU (${S.interests.join(' · ')})</div>${liked.map(filmCard).join('')}`:''}
    <div class="eyebrow b" style="margin-top:6px">ALSO AT YOUR LEVEL</div>
    ${rest.map(filmCard).join('')}
    ${stretch.length?`<div class="eyebrow r" style="margin-top:6px">STRETCH GOALS 🏔</div>${stretch.map(filmCard).join('')}`:''}
    <div class="card" style="background:var(--carta2)">
      <div class="eyebrow">HOW TO WATCH (THE ADHD WAY)</div>
      <p style="font-size:.86rem"><b>20-minute blocks, one episode ≠ one sitting.</b> After each block: say <i>one</i> line you heard, out loud, in the character's voice. Steal one word for Ripasso. That's it. Watching counts as studying — that's the whole point.</p>
    </div>
  </div>`;
}
function filmCard(f){
  return `<div class="film">
    <div class="poster" style="background:${f.c}">${f.e}</div>
    <div><b>${esc(f.t)}</b> <span class="tag ${f.lv[0]==='A'?'a':f.lv[0]==='B'?'bb':'rr'}">${f.lv}</span>
      <div class="meta">📺 ${esc(f.w)} · ${f.g.join(' · ')}</div>
      <p>${f.why}</p>
    </div>
  </div>`;
}

/* =========================================================
   RIPASSO — SRS with mnemonics
========================================================= */
function renderSRS(){
  const due=S.deck.filter(c=>c.due<=Date.now()).sort((a,b)=>a.due-b.due);
  if(!due.length){
    main.innerHTML=`<div class="fadein" style="text-align:center;padding-top:50px">
      <div style="font-size:3.4rem">🏖</div><h1>Tutto fatto.</h1>
      <p class="muted">No cards due. ${S.deck.length} cards in your deck — next reviews are scheduled. Go speak something instead.</p>
      <button class="btn primary" style="margin-top:14px" id="goParla">🎙 To the booth →</button></div>`;
    $('#goParla').onclick=()=>setTab('parla');
    if(!S.missions.srs){ S.missions.srs=true; save(); }
    return;
  }
  let i=0;
  function show(){
    if(i>=due.length){ S.missions.srs=true; touchStreak(); gainXP(20); save();
      main.innerHTML=`<div class="fadein" style="text-align:center;padding-top:50px"><div style="font-size:3.4rem">⚡</div><h1>Queue cleared!</h1><p class="muted">+20 XP. Your brain just did its push-ups.</p><button class="btn green" style="margin-top:14px" id="bk">Back to Oggi →</button></div>`;
      $('#bk').onclick=()=>setTab('oggi'); return; }
    const c=due[i];
    main.innerHTML=`
    <div class="fadein">
      <div class="eyebrow r">RIPASSO · ${i+1} / ${due.length}</div>
      <div class="progressbar" style="margin-bottom:14px"><div style="width:${i/due.length*100}%"></div></div>
      <div class="srscard"><div class="srsinner" id="srsIn">
        <div class="srsface front">
          <div class="eyebrow">WHAT DOES IT MEAN?</div>
          <div class="word">${esc(c.it)}</div>
          <button class="btn sm yellow" id="sayIt">🔊 hear it</button>
          <button class="btn dark" id="flipB" style="margin-top:8px">Flip →</button>
        </div>
        <div class="srsface back">
          <div class="word">${esc(c.it)}</div>
          <div style="font-size:1.05rem;font-weight:600">${esc(c.en)}</div>
          ${c.mn?`<div style="background:var(--giallo);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:.82rem">🧠 ${esc(c.mn)}</div>`:''}
          ${c.ex?`<div style="font-size:.8rem;opacity:.8;font-style:italic">"${esc(c.ex)}"</div>`:''}
          ${!c.mn?`<button class="btn sm yellow" id="genMn">🧠 Make me a mnemonic</button>`:''}
        </div>
      </div></div>
      <div class="gradebtns" id="grades" style="visibility:hidden">
        <button class="btn" data-g="0" style="background:var(--rosso);color:#fff">Again<br><span style="font-size:.62rem">&lt;1m</span></button>
        <button class="btn" data-g="1" style="background:var(--giallo)">Hard<br><span style="font-size:.62rem">1d</span></button>
        <button class="btn" data-g="2">Good<br><span style="font-size:.62rem">${fmtIvl(nextIvl(c,2))}</span></button>
        <button class="btn" data-g="3" style="background:var(--verde);color:#fff">Easy<br><span style="font-size:.62rem">${fmtIvl(nextIvl(c,3))}</span></button>
      </div>
    </div>`;
    $('#sayIt').onclick=()=>speak(c.it);
    $('#flipB').onclick=()=>{ $('#srsIn').classList.add('flip'); $('#grades').style.visibility='visible'; speak(c.it); };
    const gm=$('#genMn'); if(gm) gm.onclick=async()=>{ gm.innerHTML='<span class="spinner"></span>';
      const m=await ai([{role:'user',content:`Create one vivid, slightly absurd English mnemonic (max 18 words) for the Italian word "${c.it}" meaning "${c.en}". Respond with the mnemonic only.`}],'Mnemonic genius. Output the mnemonic sentence only.');
      c.mn=m.trim(); save(); show(); setTimeout(()=>{$('#srsIn').classList.add('flip');$('#grades').style.visibility='visible';},50); };
    document.querySelectorAll('#grades .btn').forEach(b=>b.onclick=()=>{ gradeCard(c,+b.dataset.g); i++; show(); });
  }
  show();
}
function nextIvl(c,g){ // simplified SM-2
  if(g===0) return 0;
  if(c.ivl===0) return g===3?3:1;
  const e = Math.max(1.3, c.ease + (g===1?-0.2:g===3?0.15:0));
  return Math.round(c.ivl*(g===1?1.2:e));
}
function fmtIvl(d){ return d===0?'<1m':d<30?d+'d':Math.round(d/30)+'mo'; }
function gradeCard(c,g){
  if(g===0){ c.ivl=0; c.due=Date.now()+60000; c.ease=Math.max(1.3,c.ease-0.2); }
  else{ const ni=nextIvl(c,g); c.ease=Math.max(1.3,c.ease+(g===1?-0.15:g===3?0.15:0)); c.ivl=ni; c.due=Date.now()+ni*86400000; }
  save();
}

/* =========================================================
   LOGIN — one username + PIN, works on every device
========================================================= */
function renderLogin(){
  $('#nav').style.display='none';
  main.innerHTML = `
  <div class="onb-hero fadein">
    <div class="eyebrow r">UN BIGLIETTO, TUTTI I DISPOSITIVI</div>
    <div class="big">Sign in once.<br>Your progress <em>follows you</em>.</div>
    <p class="muted" style="margin-top:12px">Pick any username + a PIN you'll remember. First sign-in creates the account; same details on your phone, laptop, anywhere — same streak, same deck, same level.</p>
  </div>
  <div class="card">
    <input class="ti" id="lgUser" placeholder="username (e.g. farwa)" autocapitalize="off" autocomplete="username" style="margin-bottom:10px">
    <input class="ti" id="lgPin" placeholder="PIN (4+ characters)" type="password" autocomplete="current-password">
    <button class="btn primary block" id="lgGo" style="margin-top:12px">Sign in / Create account →</button>
    <div id="lgErr" style="color:var(--rosso);font-weight:700;font-size:.85rem;margin-top:8px"></div>
  </div>
  <button class="btn sm block" id="lgSkip" style="background:var(--carta2)">Skip — keep progress on this device only</button>
  <p class="muted" style="font-size:.74rem;margin-top:10px;text-align:center">Use a throwaway PIN, not a password you use elsewhere.</p>`;
  $('#lgGo').onclick=async()=>{
    const username=$('#lgUser').value.trim(), pin=$('#lgPin').value;
    if(!/^[a-z0-9_.-]{3,24}$/i.test(username)){ $('#lgErr').textContent='Username: 3–24 letters/numbers.'; return; }
    if(pin.length<4){ $('#lgErr').textContent='PIN needs at least 4 characters.'; return; }
    $('#lgGo').innerHTML='<span class="spinner"></span>'; $('#lgGo').disabled=true;
    try{
      const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,pin})});
      const d=await r.json();
      if(!d.ok){ $('#lgErr').textContent=(d.error&&d.error.message)||'Sign-in failed.'; $('#lgGo').disabled=false; $('#lgGo').textContent='Sign in / Create account →'; return; }
      CREDS={username,pin}; localStorage.setItem('fluente-creds',JSON.stringify(CREDS));
      syncStatus='cloud';
      if(d.state && (+d.updatedAt||0) >= (S._ts||0)){ S=Object.assign({},DEFAULT_STATE,d.state); localStorage.setItem('fluente-state',JSON.stringify(S)); }
      else if(S.placed){ pushState(); }
      if(!S.deck) S.deck=buildStarterDeck(); if(!S.xpLog) S.xpLog={};
      toast(d.created?'Account created ☁️':'Bentornata ☁️');
      enterApp();
    }catch(e){ $('#lgErr').textContent='Server unreachable — try again.'; $('#lgGo').disabled=false; $('#lgGo').textContent='Sign in / Create account →'; }
  };
  $('#lgSkip').onclick=()=>{ localStorage.setItem('fluente-skip-login','1'); enterApp(); };
}
function enterApp(){
  renderHeader();
  if(!S.placed){ renderOnboarding(); }
  else{ touchStreak(); $('#nav').style.display='flex'; setTab('oggi'); }
}
function signOut(){
  localStorage.removeItem('fluente-creds'); localStorage.removeItem('fluente-skip-login');
  CREDS=null; syncStatus='local'; renderLogin();
}

/* =========================================================
   BOOT
========================================================= */
(async function(){
  await loadState();
  renderHeader();
  if(!CREDS && !localStorage.getItem('fluente-skip-login')){ renderLogin(); }
  else enterApp();
})();
</script>
</body>
